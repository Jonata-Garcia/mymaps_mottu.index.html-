<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyMaps Mottu - Solicitar Mapa</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --mottu-green: #00C566;
      --mottu-green-dark: #00A855;
      --mottu-green-light: #E6FAF1;
      --mottu-black: #0A0A0A;
      --mottu-gray-900: #111111;
      --mottu-gray-700: #2D2D2D;
      --mottu-gray-500: #6B6B6B;
      --mottu-gray-200: #E8E8E8;
      --mottu-gray-100: #F5F5F5;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--mottu-black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--mottu-green);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.3px;
    }

    .logo-text span { color: var(--mottu-green); }

    .badge {
      margin-left: auto;
      background: rgba(0,197,102,0.12);
      color: var(--mottu-green);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(0,197,102,0.2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    /* Form card */
    .card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--mottu-green), transparent);
    }

    .card-eyebrow {
      font-size: 11px;
      font-weight: 600;
      color: var(--mottu-green);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-eyebrow::before {
      content: '';
      width: 16px;
      height: 2px;
      background: var(--mottu-green);
      border-radius: 2px;
    }

    .card-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--mottu-gray-500);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Input */
    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mottu-gray-500);
      font-size: 16px;
    }

    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px 14px 42px;
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-field::placeholder {
      color: rgba(255,255,255,0.2);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    .input-field:focus {
      border-color: var(--mottu-green);
      background: rgba(0,197,102,0.04);
      box-shadow: 0 0 0 3px rgba(0,197,102,0.1);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      background: var(--mottu-green);
      color: var(--mottu-black);
      border: none;
      border-radius: 10px;
      padding: 15px 24px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      background: var(--mottu-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,197,102,0.25);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Loading */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--mottu-black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result card */
    .result-card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: none;
    }

    .result-card.success::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--mottu-green);
    }

    .result-card.existing::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #F59E0B;
    }

    .result-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .result-icon.success { background: rgba(0,197,102,0.12); }
    .result-icon.existing { background: rgba(245,158,11,0.12); }

    .result-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .result-placa {
      font-size: 13px;
      color: var(--mottu-gray-500);
      margin-bottom: 8px;
    }

    .result-points {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,197,102,0.1);
      color: var(--mottu-green);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    .btn-kml {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--mottu-green);
      color: var(--mottu-black);
      text-decoration: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      margin-bottom: 12px;
    }

    .btn-kml:hover {
      background: var(--mottu-green-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,197,102,0.25);
    }

    .btn-novo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      width: 100%;
      justify-content: center;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-novo:hover { color: rgba(255,255,255,0.7); }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #FCA5A5;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* Footer */
    .footer {
      padding: 20px 32px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-text {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }

    .footer-text span { color: var(--mottu-green); }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 6V12C4 16.4 7.4 20.5 12 22C16.6 20.5 20 16.4 20 12V6L12 2Z" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="0.5"/>
        <path d="M12 5L7 7.5V12C7 15.1 9.2 17.9 12 19C14.8 17.9 17 15.1 17 12V7.5L12 5Z" fill="#0A0A0A"/>
        <circle cx="12" cy="12" r="3" fill="#0A0A0A" stroke="#0A0A0A"/>
        <path d="M8 10L12 5L16 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 14H15M12 11V17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-text">Mottu <span>RecOps</span></div>
    <div class="badge">MyMaps</div>
  </header>

  <main class="main">
    <div class="container">

      <!-- Form Card -->
      <div class="card" id="formCard">
        <div class="card-eyebrow">Recuperação de Veículos</div>
        <h1 class="card-title">Solicitar mapa<br>de rastreio</h1>
        <p class="card-subtitle">Informe a placa da moto para gerar o arquivo KML com os pontos de localização.</p>

        <form id="placaForm" onsubmit="submitForm(event)">
          <div class="input-group">
            <label class="input-label" for="placa">Placa do veículo</label>
            <div class="input-wrapper">
              <span class="input-icon">🏍</span>
              <input
                type="text"
                id="placa"
                class="input-field"
                placeholder="Ex: UAX-2F98"
                maxlength="8"
                autocomplete="off"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">
            <span id="btnText">Gerar mapa</span>
            <span id="btnArrow">→</span>
            <div class="spinner" id="spinner"></div>
          </button>

          <div class="error-msg" id="errorMsg"></div>
        </form>
      </div>

      <!-- Result Card -->
      <div class="result-card" id="resultCard">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-placa" id="resultPlaca"></div>
        <div class="result-points" id="resultPoints" style="display:none"></div>

        <a href="#" class="btn-kml" id="kmlBtn" target="_blank">
          📁 Abrir KML
        </a>

        <button class="btn-novo" onclick="resetForm()">
          ← Solicitar outro mapa
        </button>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p class="footer-text">Mottu RecOps · <span>MyMaps Automation</span> · Powered by N8N</p>
  </footer>

<script>
  const WEBHOOK_BASE = 'https://webhook-n8n-int.mottu.io/webhook/solicitar-mymaps';

  function submitForm(e) {
    e.preventDefault();
    const placa = document.getElementById('placa').value.trim().toUpperCase();
    
    if (!placa || placa.length < 6) {
      showError('Informe uma placa válida (ex: UAX-2F98)');
      return;
    }

    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const btnArrow = document.getElementById('btnArrow');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Gerando mapa...';
    btnArrow.style.display = 'none';

    window.location.href = `${WEBHOOK_BASE}?Placa=${encodeURIComponent(placa)}`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('placa').addEventListener('input', function(e) {
    let val = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (val.length > 3) val = val.slice(0,3) + '-' + val.slice(3);
    e.target.value = val;
  });
</script>

</body>
</html>
